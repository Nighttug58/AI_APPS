<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tileset Editor PRO v3 — Sélections, rotation & raccourcis</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #16181d;
            --panel: #23262d;
            --panel-2: #1c1f25;
            --text: #eef1f4;
            --muted: #a7adb7;
            --accent: #56c271;
            --accent-hover: #69d683;
            --danger: #df5b62;
            --border: #3a3f49;
            --blue: #4aa3ff;
            --button: #343943;
            --button-hover: #414752;
            --shadow: rgba(0, 0, 0, 0.45);
            --left-width: 330px;
            --right-width: 370px;
            --collapsed-width: 34px;
        }

        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font: 11.5px/1.35 "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: grid;
            grid-template-columns: var(--left-width) minmax(260px, 1fr) var(--right-width);
            grid-template-rows: minmax(0, 1fr) 29px;
            overflow: hidden;
            user-select: none;
        }

        body.left-collapsed { grid-template-columns: var(--collapsed-width) minmax(260px, 1fr) var(--right-width); }
        body.right-collapsed { grid-template-columns: var(--left-width) minmax(260px, 1fr) var(--collapsed-width); }
        body.left-collapsed.right-collapsed { grid-template-columns: var(--collapsed-width) minmax(260px, 1fr) var(--collapsed-width); }

        .panel {
            position: relative;
            min-width: 0;
            padding: 13px 15px;
            background: var(--panel);
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-color: #555b66 transparent;
        }

        .toolbar { border-right: 1px solid var(--border); }
        .layers-panel { border-left: 1px solid var(--border); }
        .sidebar-content { min-width: 296px; }
        .layers-panel .sidebar-content { min-width: 336px; }
        body.left-collapsed .toolbar { padding: 0; overflow: hidden; }
        body.right-collapsed .layers-panel { padding: 0; overflow: hidden; }
        body.left-collapsed .toolbar .sidebar-content,
        body.right-collapsed .layers-panel .sidebar-content { display: none; }

        .collapse-button {
            position: fixed;
            top: 50%;
            z-index: 30;
            width: 23px;
            min-width: 23px;
            height: 48px;
            min-height: 48px;
            padding: 0;
            border-radius: 5px;
            font-size: 18px;
            line-height: 1;
            transform: translateY(-50%);
            box-shadow: 0 3px 12px rgba(0,0,0,.35);
            transition: none !important;
        }
        .collapse-button:active { transform: translateY(-50%) !important; }
        #toggleLeft { left: calc(var(--left-width) - 12px); }
        #toggleRight { right: calc(var(--right-width) - 12px); }
        body.left-collapsed #toggleLeft { left: 5px; }
        body.right-collapsed #toggleRight { right: 5px; }

        .workspace {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 38px;
            background: radial-gradient(circle at center, rgba(255,255,255,.035), transparent 55%), #101216;
        }

        .canvas-container {
            position: relative;
            flex: 0 0 auto;
            margin: auto;
            background-color: #252932;
            background-image:
                linear-gradient(45deg, #353a44 25%, transparent 25%),
                linear-gradient(-45deg, #353a44 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #353a44 75%),
                linear-gradient(-45deg, transparent 75%, #353a44 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            box-shadow: 0 14px 45px var(--shadow);
            outline: 1px solid #474d59;
        }

        canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #mainCanvas { cursor: crosshair; touch-action: none; }
        #selectionCanvas { position: absolute; inset: 0; pointer-events: none; }

        h2 { margin: 0 0 12px; font-size: 16px; letter-spacing: .15px; }
        h3 {
            margin: 15px 0 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-size: 10.5px;
            letter-spacing: .85px;
            text-transform: uppercase;
        }
        h3:first-of-type { margin-top: 0; }
        button, input, select { font: inherit; }

        button {
            min-height: 30px;
            border: 1px solid transparent;
            border-radius: 5px;
            background: var(--button);
            color: var(--text);
            padding: 5px 7px;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease, transform 60ms ease;
        }
        button:hover:not(:disabled) { background: var(--button-hover); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: .42; cursor: not-allowed; }
        button.active { background: var(--accent); color: #102015; }
        button.primary { background: var(--accent); color: #102015; font-weight: 700; }
        button.primary:hover:not(:disabled) { background: var(--accent-hover); }
        button.danger { background: #71343a; }
        button.small { min-height: 25px; padding: 3px 6px; font-size: 10.5px; }
        button.icon { min-width: 26px; padding: 3px 5px; }

        .tool-grid, .button-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; }
        .button-row { display: flex; gap: 5px; }
        .button-row > * { flex: 1; min-width: 0; }
        .control { display: grid; gap: 4px; margin-bottom: 8px; color: var(--muted); }
        .control-line { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
        .context-control[hidden] { display: none !important; }
        input[type="range"] { width: 100%; }
        input[type="color"] {
            width: 100%; height: 34px; border: 1px solid var(--border); border-radius: 5px;
            padding: 2px; background: var(--panel-2); cursor: pointer;
        }
        input[type="text"], input[type="number"], select {
            width: 100%; border: 1px solid var(--border); border-radius: 5px;
            background: var(--panel-2); color: var(--text); padding: 6px 7px;
        }
        input[type="checkbox"] { accent-color: var(--accent); }
        .check-line { display: flex; align-items: center; gap: 6px; color: var(--muted); }
        .dimension-box { padding: 9px; border: 1px solid var(--border); border-radius: 7px; background: var(--panel-2); margin-bottom: 8px; }
        .dimension-title { margin-bottom: 7px; color: var(--text); font-weight: 650; }
        .dimension-grid { display: grid; grid-template-columns: minmax(0, 82px) minmax(0, 82px) auto minmax(86px, 1fr); gap: 6px; align-items: end; }
        .dimension-grid label:not(.check-line) { display: grid; gap: 3px; color: var(--muted); }
        .dimension-grid input[type="number"] { min-width: 0; padding: 5px 6px; }
        .dimension-grid .check-line { align-self: end; min-height: 29px; white-space: nowrap; }
        .dimension-grid button { align-self: end; }
        .rotation-box { margin-top: 8px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--panel-2); }
        .rotation-line { display: grid; grid-template-columns: minmax(0, 1fr) 76px; gap: 7px; align-items: center; }
        .rotation-angle { text-align: right; }
        .memory-active { border-color: var(--blue) !important; background: #25415c !important; }
        .hint { margin: 7px 0 0; color: var(--muted); font-size: 10px; line-height: 1.4; }
        .kbd { display: inline-block; padding: 1px 4px; border: 1px solid #555b66; border-bottom-width: 2px; border-radius: 4px; background: #2b2f37; color: #e5e8ec; font-size: 9px; }

        .layer-list { display: grid; gap: 6px; margin-top: 10px; }
        .layer-item {
            position: relative;
            display: grid;
            grid-template-columns: 25px 42px minmax(0, 1fr) auto;
            align-items: center;
            gap: 6px;
            min-height: 40px;
            padding: 6px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: var(--panel-2);
            cursor: pointer;
        }
        .layer-item:hover { border-color: #4b515d; }
        .layer-item.active { border-color: var(--accent); background: #28322b; }
        .layer-item.background-layer { background: #29262a; }
        .layer-item.dragging { opacity: .35; }
        .layer-item.drop-before::before,
        .layer-item.drop-after::after {
            content: "";
            position: absolute;
            left: 5px; right: 5px;
            height: 3px;
            border-radius: 2px;
            background: var(--blue);
            box-shadow: 0 0 7px rgba(74,163,255,.8);
            z-index: 5;
        }
        .layer-item.drop-before::before { top: -5px; }
        .layer-item.drop-after::after { bottom: -5px; }
        .layer-preview {
            width: 40px; height: 40px; border: 1px solid #4b515d; border-radius: 4px;
            background-color: #252932;
            background-image: linear-gradient(45deg,#363b45 25%,transparent 25%),linear-gradient(-45deg,#363b45 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#363b45 75%),linear-gradient(-45deg,transparent 75%,#363b45 75%);
            background-size: 8px 8px; background-position: 0 0,0 4px,4px -4px,-4px 0;
            image-rendering: pixelated; flex: 0 0 auto;
        }
        .layer-item.locked-layer { border-style: dashed; }
        .layer-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11.5px; }
        .layer-meta { color: var(--muted); font-size: 9px; }
        .layer-actions { display: flex; gap: 3px; align-items: center; }
        .visibility.off { opacity: .35; }
        .bg-color-mini { width: 30px !important; height: 25px !important; padding: 1px !important; }
        .drag-hint { color: #707783; font-size: 14px; cursor: grab; }
        .drag-hint:active { cursor: grabbing; }

        .statusbar {
            grid-column: 1 / -1;
            display: flex; align-items: center; justify-content: space-between; gap: 14px;
            padding: 0 11px; border-top: 1px solid var(--border); background: #121419;
            color: var(--muted); font-size: 10px; white-space: nowrap; overflow: hidden;
        }
        .statusbar span { overflow: hidden; text-overflow: ellipsis; }

        .drop-active::after {
            content: "Déposez un PNG ou un projet JSON";
            position: absolute; inset: 20px; display: grid; place-items: center;
            border: 2px dashed var(--accent); border-radius: 12px;
            background: rgba(16,18,22,.88); color: var(--accent); font-size: 17px; font-weight: 700;
            pointer-events: none; z-index: 10;
        }

        .modal-backdrop {
            position: fixed; inset: 0; z-index: 100; display: grid; place-items: center;
            padding: 24px; background: rgba(0,0,0,.72);
        }
        .modal-backdrop[hidden] { display: none; }
        .modal-card {
            width: min(620px, 96vw); max-height: min(760px, 90vh); overflow: auto;
            border: 1px solid var(--border); border-radius: 10px; background: var(--panel);
            box-shadow: 0 20px 70px rgba(0,0,0,.65); padding: 16px;
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .modal-header h2 { margin: 0; }
        .shortcut-list { display: grid; gap: 6px; }
        .shortcut-row { display: grid; grid-template-columns: minmax(160px,1fr) 180px; align-items: center; gap: 10px; }
        .shortcut-input { text-align: center; cursor: pointer; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 7px; margin-top: 14px; }

        @media (max-width: 1100px) {
            :root { --left-width: 300px; --right-width: 330px; }
            .panel { padding: 10px 12px; }
            .sidebar-content { min-width: 274px; }
            .layers-panel .sidebar-content { min-width: 304px; }
        }
    </style>
</head>
<body>
    <aside class="panel toolbar" id="leftSidebar">
        <button class="collapse-button" id="toggleLeft" title="Rétracter la barre gauche">‹</button>
        <div class="sidebar-content">
            <h2>Tileset Editor PRO v3</h2>

            <h3>Historique</h3>
            <div class="button-row">
                <button id="btnUndo" onclick="executeUndo()" title="Ctrl+Z">↶ Annuler</button>
                <button id="btnRedo" onclick="executeRedo()" title="Ctrl+Y / Ctrl+Maj+Z">↷ Rétablir</button>
            </div>

            <h3>Outils</h3>
            <div class="tool-grid" id="toolGrid">
                <button id="btn-pencil" class="active" onclick="setTool('pencil')" title="B">Crayon</button>
                <button id="btn-eraser" onclick="setTool('eraser')" title="E">Gomme</button>
                <button id="btn-fill" onclick="setTool('fill')" title="G">Remplir</button>
                <button id="btn-move" onclick="setTool('move')" title="M">Déplacer calque</button>
                <button id="btn-rect-select" onclick="setTool('rect-select')" title="R">Sélect. rectangle</button>
                <button id="btn-lasso-select" onclick="setTool('lasso-select')" title="L">Sélect. lasso</button>
                <button id="btn-wand" onclick="setTool('wand')" title="W">Baguette magique</button>
            </div>

            <h3>Dessin</h3>
            <div class="control">
                <label for="colorPicker">Couleur</label>
                <input type="color" id="colorPicker" value="#ffffff">
            </div>
            <div class="control context-control" id="brushControl">
                <div class="control-line"><label for="brushSize">Épaisseur</label><span id="brushValue">1 px</span></div>
                <input type="range" id="brushSize" min="1" max="32" value="1">
            </div>
            <div class="control context-control" id="toleranceControl" hidden>
                <div class="control-line"><label for="tolerance">Tolérance couleur</label><span id="tolValue">0</span></div>
                <input type="range" id="tolerance" min="0" max="510" value="0">
            </div>

            <h3>Sélection</h3>
            <div class="button-grid">
                <button onclick="copySelection()" title="Ctrl+C">Copier</button>
                <button onclick="cutSelection()" title="Ctrl+X">Couper</button>
                <button onclick="pasteSelection(false)" title="Ctrl+V">Coller</button>
                <button onclick="pasteSelection(true)">Coller + calque</button>
                <button onclick="invertSelection()">Inverser sélection</button>
                <button id="btnMemorizeSelection" onclick="memorizeSelection()">Mémoriser sélection</button>
                <button id="btnForgetSelection" onclick="clearSelectionMemory()" disabled>Oublier mémoire</button>
                <button onclick="clearSelection()">Désélectionner</button>
                <button id="btnBake" class="primary" onclick="bakeFloatingSelection()" disabled>Valider</button>
                <button id="btnCancelFloat" onclick="cancelFloatingSelection()" disabled>Annuler transfo.</button>
                <button onclick="deleteSelectedPixels()" class="danger">Effacer pixels</button>
            </div>
            <div class="rotation-box" id="rotationControl" hidden>
                <div class="control-line"><label for="rotationRange">Rotation</label><span>Centre de l’élément</span></div>
                <div class="rotation-line">
                    <input type="range" id="rotationRange" min="0" max="360" step="1" value="0">
                    <input type="text" id="rotationAngle" class="rotation-angle" value="0°" inputmode="decimal" aria-label="Angle précis">
                </div>
            </div>

            <h3>Affichage & fichier</h3>
            <button id="btn-3x3" onclick="toggle3x3()">Activer aperçu 3×3 seamless</button>
            <div class="control" style="margin-top:8px">
                <div class="control-line"><label for="zoomRange">Zoom</label><span id="zoomValue">15×</span></div>
                <input type="range" id="zoomRange" min="0.05" max="40" step="0.05" value="15">
            </div>
            <div class="button-grid">
                <button onclick="openFilePicker('png')">Import PNG en calque</button>
                <button onclick="requestNewPNG()">Charger nouveau PNG</button>
                <button onclick="openFilePicker('project')">Charger projet</button>
                <button onclick="exportPNG()" class="primary">Exporter PNG</button>
                <button onclick="exportProject()">Sauver projet</button>
                <button onclick="openShortcutModal()">Raccourcis</button>
            </div>
            <input type="file" id="pngInput" accept="image/png" hidden>
            <input type="file" id="newPngInput" accept="image/png" hidden>
            <input type="file" id="projectInput" accept="application/json,.json" hidden>
        </div>
    </aside>

    <main class="workspace" id="workspace">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="mainCanvas"></canvas>
            <canvas id="selectionCanvas"></canvas>
        </div>
    </main>

    <aside class="panel layers-panel" id="rightSidebar">
        <button class="collapse-button" id="toggleRight" title="Rétracter la barre droite">›</button>
        <div class="sidebar-content">
            <h2>Document & calques</h2>

            <h3>Dimensions</h3>
            <div class="dimension-box">
                <div class="dimension-title">Taille du canvas</div>
                <div class="dimension-grid">
                    <label>Largeur<input type="number" id="canvasWidth" min="1" max="4096" value="32"></label>
                    <label>Hauteur<input type="number" id="canvasHeight" min="1" max="4096" value="32"></label>
                    <label class="check-line"><input type="checkbox" id="canvasRatioLock" checked> Ratio</label>
                    <button onclick="applyCanvasResize()">Appliquer</button>
                </div>
            </div>

            <div class="dimension-box">
                <div class="dimension-title">Taille de l’image</div>
                <div class="dimension-grid">
                    <label>Largeur<input type="number" id="imageWidth" min="1" max="4096" value="32"></label>
                    <label>Hauteur<input type="number" id="imageHeight" min="1" max="4096" value="32"></label>
                    <label class="check-line"><input type="checkbox" id="imageRatioLock" checked> Ratio</label>
                    <button onclick="applyImageResize()">Redimensionner</button>
                </div>
            </div>
            <label class="check-line"><input type="checkbox" id="fitCanvasOnImport" checked> Adapter automatiquement le canvas au PNG importé</label>

            <h3>Calques</h3>
            <div class="button-grid">
                <button onclick="addLayer()">+ Nouveau</button>
                <button onclick="duplicateActiveLayer()">Dupliquer</button>
                <button onclick="addBackgroundLayer()">+ Fond uni</button>
                <button onclick="mergeDown()">Fusionner bas</button>
            </div>

            <h3>Calque actif</h3>
            <div class="control"><label for="layerName">Nom</label><input type="text" id="layerName" maxlength="60"></div>
            <div class="control">
                <div class="control-line"><label for="layerOpacity">Opacité</label><span id="opacityValue">100 %</span></div>
                <input type="range" id="layerOpacity" min="0" max="100" value="100">
            </div>
            <div class="button-row">
                <button id="moveLayerUp" onclick="moveLayerOrder(1)">Monter</button>
                <button id="moveLayerDown" onclick="moveLayerOrder(-1)">Descendre</button>
                <button id="activeLayerLock" onclick="toggleActiveLayerLock()">Verrouiller</button>
                <button id="deleteActiveLayerBtn" onclick="deleteLayer(activeLayerIndex)" class="danger">Supprimer</button>
            </div>
            <div class="button-row" style="margin-top:5px">
                <button id="resetOffsetBtn" onclick="resetLayerOffset()">Réinitialiser décalage</button>
                <button id="flattenOffsetBtn" onclick="flattenLayerOffset()">Appliquer décalage</button>
            </div>

            <div class="layer-list" id="layerList"></div>
        </div>
    </aside>

    <div class="modal-backdrop" id="shortcutModal" hidden>
        <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="shortcutTitle">
            <div class="modal-header">
                <h2 id="shortcutTitle">Raccourcis clavier</h2>
                <button class="small icon" onclick="closeShortcutModal()" aria-label="Fermer">×</button>
            </div>
            <div class="shortcut-list" id="shortcutList"></div>
            <div class="modal-actions">
                <button onclick="resetShortcutDrafts()">Valeurs par défaut</button>
                <button onclick="closeShortcutModal()">Annuler</button>
                <button class="primary" onclick="saveShortcutSettings()">Enregistrer</button>
            </div>
        </section>
    </div>

    <footer class="statusbar">
        <span id="statusText">Prêt.</span>
        <span id="cursorText">32 × 32 px</span>
    </footer>

    <script>
        "use strict";

        const MAX_HISTORY = 50;
        const MAX_DIMENSION = 4096;
        let DOC_W = 32;
        let DOC_H = 32;
        let IMAGE_W = 32;
        let IMAGE_H = 32;
        let SCALE = 15;
        let is3x3Mode = false;
        let currentTool = "pencil";
        let currentColor = "#ffffff";
        let brushSize = 1;
        let isPointerDown = false;
        let actionDirty = false;
        let startX = 0, startY = 0, currentX = 0, currentY = 0;
        let selectionMode = "replace";
        let lassoPoints = [];
        let selectionMask = new Uint8Array(DOC_W * DOC_H);
        let hasSelection = false;
        let selectionMemory = null;
        let selectionMemoryActive = false;
        let clipboardBuffer = null;
        let floatingSelection = null;
        let activeHandle = null;
        let draggedLayer = null;
        let dragSlot = null;
        let projectDirty = false;
        const UNSAVED_MESSAGE = "Voulez-vous vraiment fermer cette page sans sauvegarder le projet ?";

        const mainCanvas = document.getElementById("mainCanvas");
        const mainCtx = mainCanvas.getContext("2d", { willReadFrequently: true });
        const selectionCanvas = document.getElementById("selectionCanvas");
        const selectionCtx = selectionCanvas.getContext("2d");
        const canvasContainer = document.getElementById("canvasContainer");
        const workspace = document.getElementById("workspace");
        let compCanvas = createCanvas(DOC_W, DOC_H);
        let compCtx = compCanvas.getContext("2d", { willReadFrequently: true });
        let previewCanvas = createCanvas(DOC_W, DOC_H);
        let previewCtx = previewCanvas.getContext("2d", { willReadFrequently: true });

        function createCanvas(width, height) {
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            return canvas;
        }
        function mod(value, modulo) { return ((value % modulo) + modulo) % modulo; }
        function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
        function pixelIndex(x, y) { return y * DOC_W + x; }
        function setStatus(message) { document.getElementById("statusText").textContent = message; }
        function validDimension(value) { return clamp(Math.round(Number(value) || 1), 1, MAX_DIMENSION); }

        function rebuildBuffers() {
            compCanvas = createCanvas(DOC_W, DOC_H);
            compCtx = compCanvas.getContext("2d", { willReadFrequently: true });
            previewCanvas = createCanvas(DOC_W, DOC_H);
            previewCtx = previewCanvas.getContext("2d", { willReadFrequently: true });
            compCtx.imageSmoothingEnabled = false;
            previewCtx.imageSmoothingEnabled = false;
        }

        class Layer {
            constructor(name, options = {}) {
                this.name = name;
                this.canvas = createCanvas(options.width || DOC_W, options.height || DOC_H);
                this.ctx = this.canvas.getContext("2d", { willReadFrequently: true });
                this.ctx.imageSmoothingEnabled = false;
                this.offsetX = Number(options.offsetX) || 0;
                this.offsetY = Number(options.offsetY) || 0;
                this.visible = options.visible !== false;
                this.opacity = Number.isFinite(Number(options.opacity)) ? clamp(Number(options.opacity), 0, 1) : 1;
                this.isBackground = Boolean(options.isBackground);
                this.locked = this.isBackground || Boolean(options.locked);
                this.bgColor = options.bgColor || "#000000";
                if (this.isBackground) this.initBackground(this.bgColor);
            }
            setDimensions(width, height) {
                this.canvas.width = width;
                this.canvas.height = height;
                this.ctx = this.canvas.getContext("2d", { willReadFrequently: true });
                this.ctx.imageSmoothingEnabled = false;

        document.getElementById("rotationAngle").addEventListener("change",e=>setFloatingAngle(e.target.value,"manual"));
        document.getElementById("rotationAngle").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();setFloatingAngle(e.target.value,"manual");e.target.blur();}});

        function syncDimensionInputs(){
            const canvasRatio=DOC_W/DOC_H,imageRatio=IMAGE_W/IMAGE_H;
            const cw=document.getElementById("canvasWidth"),ch=document.getElementById("canvasHeight"),iw=document.getElementById("imageWidth"),ih=document.getElementById("imageHeight");
            cw.value=DOC_W;ch.value=DOC_H;cw.dataset.ratio=canvasRatio;ch.dataset.ratio=canvasRatio;
            iw.value=IMAGE_W;ih.value=IMAGE_H;iw.dataset.ratio=imageRatio;ih.dataset.ratio=imageRatio;
            document.getElementById("cursorText").textContent=`${DOC_W} × ${DOC_H} px`;
        }
        function bindRatioInputs(widthId,heightId,lockId){
            let internal=false;
            const w=document.getElementById(widthId),h=document.getElementById(heightId),lock=document.getElementById(lockId);
            const refreshRatio=()=>{const ratio=validDimension(w.value)/validDimension(h.value);w.dataset.ratio=ratio;h.dataset.ratio=ratio;};
            lock.addEventListener("change",refreshRatio);
            w.addEventListener("input",()=>{if(internal||!lock.checked)return;const ratio=Number(w.dataset.ratio)||1;internal=true;h.value=validDimension(validDimension(w.value)/ratio);internal=false;});
            h.addEventListener("input",()=>{if(internal||!lock.checked)return;const ratio=Number(h.dataset.ratio)||1;internal=true;w.value=validDimension(validDimension(h.value)*ratio);internal=false;});
        }
        bindRatioInputs("canvasWidth","canvasHeight","canvasRatioLock");bindRatioInputs("imageWidth","imageHeight","imageRatioLock");

        function clearSelectionStateForResize(){selectionMask=new Uint8Array(DOC_W*DOC_H);hasSelection=false;selectionMemory=null;selectionMemoryActive=false;lassoPoints=[];updateSelectionMemoryUI();}
        function resizeCanvasOnly(newW,newH,commit=true){
            newW=validDimension(newW);newH=validDimension(newH);if(newW===DOC_W&&newH===DOC_H)return false;
            if(floatingSelection)cancelFloatingSelection();
            const backups=layers.map(layer=>cloneCanvas(layer.canvas));DOC_W=newW;DOC_H=newH;rebuildBuffers();clearSelectionStateForResize();
            layers.forEach((layer,index)=>{const old=backups[index];layer.setDimensions(DOC_W,DOC_H);if(layer.isBackground)layer.initBackground(layer.bgColor);else layer.ctx.drawImage(old,0,0);});
            syncDimensionInputs();resizeDisplay();updateLayerUI();if(commit)history.commit();setStatus(`Canvas redimensionné en ${DOC_W} × ${DOC_H}.`);return true;
        }
        function resizeImageOnly(newW,newH,commit=true){
            newW=validDimension(newW);newH=validDimension(newH);if(newW===IMAGE_W&&newH===IMAGE_H)return false;
            if(layers.some(layer=>!layer.isBackground&&layer.locked)){setStatus("Déverrouillez les calques avant de redimensionner l’image.");return false;}
            if(floatingSelection)cancelFloatingSelection();
            const sourceW=Math.max(1,Math.min(IMAGE_W,DOC_W)),sourceH=Math.max(1,Math.min(IMAGE_H,DOC_H));
            layers.forEach(layer=>{
                if(layer.isBackground)return;
                const visual=getLayerVisualCanvas(layer,false),out=createCanvas(DOC_W,DOC_H),ctx=out.getContext("2d");ctx.imageSmoothingEnabled=false;
                ctx.drawImage(visual,0,0,sourceW,sourceH,0,0,newW,newH);
                layer.ctx.clearRect(0,0,DOC_W,DOC_H);layer.ctx.drawImage(out,0,0);layer.offsetX=layer.offsetY=0;
            });
            IMAGE_W=newW;IMAGE_H=newH;selectionMask.fill(0);hasSelection=false;selectionMemory=null;selectionMemoryActive=false;updateSelectionMemoryUI();syncDimensionInputs();updateLayerUI();render();if(commit)history.commit();
            const clipped=newW>DOC_W||newH>DOC_H;setStatus(`Image redimensionnée en ${IMAGE_W} × ${IMAGE_H}, canvas inchangé (${DOC_W} × ${DOC_H})${clipped?" — dépassement rogné":""}.`);return true;
        }
        function applyCanvasResize(){resizeCanvasOnly(document.getElementById("canvasWidth").value,document.getElementById("canvasHeight").value,true);}
        function applyImageResize(){resizeImageOnly(document.getElementById("imageWidth").value,document.getElementById("imageHeight").value,true);}

        function openFilePicker(type){document.getElementById(type==="png"?"pngInput":"projectInput").click();}
        document.getElementById("pngInput").addEventListener("change",e=>{const file=e.target.files[0];if(file)loadPNGAsLayer(file);e.target.value="";});
        document.getElementById("newPngInput").addEventListener("change",e=>{const file=e.target.files[0];if(file)loadNewPNGProject(file);e.target.value="";});
        document.getElementById("projectInput").addEventListener("change",e=>{const file=e.target.files[0];if(file)loadProjectFile(file);e.target.value="";});
        function requestNewPNG(){if(window.confirm(UNSAVED_MESSAGE))document.getElementById("newPngInput").click();}
        function readPNG(file,onload){const reader=new FileReader();reader.onerror=()=>setStatus("Erreur de lecture du PNG.");reader.onload=()=>{const image=new Image();image.onload=()=>onload(image);image.onerror=()=>setStatus("PNG invalide.");image.src=reader.result;};reader.readAsDataURL(file);}
        function loadPNGAsLayer(file){
            readPNG(file,image=>{
                if(image.naturalWidth>MAX_DIMENSION||image.naturalHeight>MAX_DIMENSION)return setStatus(`Image trop grande. Limite : ${MAX_DIMENSION} × ${MAX_DIMENSION}.`);
                if(floatingSelection)cancelFloatingSelection();
                if(document.getElementById("fitCanvasOnImport").checked)resizeCanvasOnly(image.naturalWidth,image.naturalHeight,false);
                const base=file.name.replace(/\.png$/i,"")||"Image importée";const layer=new Layer(base);layers.push(layer);activeLayerIndex=layers.length-1;
                layer.ctx.imageSmoothingEnabled=false;layer.ctx.drawImage(image,0,0);layer.offsetX=layer.offsetY=0;
                IMAGE_W=Math.max(IMAGE_W,image.naturalWidth);IMAGE_H=Math.max(IMAGE_H,image.naturalHeight);
                syncDimensionInputs();history.commit();updateLayerUI();render();setStatus(`PNG importé dans un nouveau calque : ${image.naturalWidth} × ${image.naturalHeight}.`);
            });
        }
        function loadNewPNGProject(file){
            readPNG(file,image=>{
                if(image.naturalWidth>MAX_DIMENSION||image.naturalHeight>MAX_DIMENSION)return setStatus(`Image trop grande. Limite : ${MAX_DIMENSION} × ${MAX_DIMENSION}.`);
                DOC_W=image.naturalWidth;DOC_H=image.naturalHeight;IMAGE_W=DOC_W;IMAGE_H=DOC_H;rebuildBuffers();clearSelectionStateForResize();floatingSelection=null;activeHandle=null;
                const layer=new Layer(file.name.replace(/\.png$/i,"")||"Calque 1");layer.ctx.drawImage(image,0,0);layers=[layer];activeLayerIndex=0;
                syncDimensionInputs();resizeDisplay();updateLayerUI();history.reset(false);projectDirty=true;setStatus(`Nouveau projet créé depuis ${file.name} (${DOC_W} × ${DOC_H}).`);
            });
        }
        function exportPNG(){composeLayers();downloadDataURL(compCanvas.toDataURL("image/png"),`tileset_${DOC_W}x${DOC_H}.png`);setStatus(`PNG ${DOC_W} × ${DOC_H} exporté.`);}
        function exportProject(){
            const project={format:"tileset-editor-pro",version:3,width:DOC_W,height:DOC_H,imageWidth:IMAGE_W,imageHeight:IMAGE_H,activeLayerIndex,layers:layers.map(layer=>({name:layer.name,offsetX:layer.offsetX,offsetY:layer.offsetY,visible:layer.visible,opacity:layer.opacity,isBackground:layer.isBackground,locked:layer.locked,bgColor:layer.bgColor,image:layer.canvas.toDataURL("image/png")}))};
            const url=URL.createObjectURL(new Blob([JSON.stringify(project,null,2)],{type:"application/json"}));downloadDataURL(url,`tileset_project_${DOC_W}x${DOC_H}.json`,true);projectDirty=false;setStatus("Projet complet exporté.");
        }
        async function loadProjectFile(file){
            try{
                const p=JSON.parse(await file.text());if(!p||p.format!=="tileset-editor-pro"||!Array.isArray(p.layers)||!p.layers.length)throw new Error("Format incompatible");
                const width=validDimension(p.width||p.size||32),height=validDimension(p.height||p.size||32);DOC_W=width;DOC_H=height;IMAGE_W=validDimension(p.imageWidth||width);IMAGE_H=validDimension(p.imageHeight||height);rebuildBuffers();selectionMask=new Uint8Array(DOC_W*DOC_H);selectionMemory=null;selectionMemoryActive=false;
                const restored=[];for(const d of p.layers){const layer=new Layer(String(d.name||"Calque"),{width:DOC_W,height:DOC_H,offsetX:Number(d.offsetX)||0,offsetY:Number(d.offsetY)||0,visible:d.visible!==false,opacity:clamp(Number(d.opacity??1),0,1),isBackground:Boolean(d.isBackground),locked:Boolean(d.locked),bgColor:d.bgColor||"#000000"});if(d.image){const image=await loadImageFromURL(d.image);layer.ctx.clearRect(0,0,DOC_W,DOC_H);layer.ctx.drawImage(image,0,0,DOC_W,DOC_H);}restored.push(layer);}
                layers=restored;ensureBackgroundAtBottom();activeLayerIndex=clamp(Number(p.activeLayerIndex)||0,0,layers.length-1);floatingSelection=null;clearSelection(false);syncDimensionInputs();resizeDisplay();updateLayerUI();updateSelectionMemoryUI();history.reset(false);projectDirty=false;setStatus(`Projet chargé : ${DOC_W} × ${DOC_H}, ${layers.length} calque(s).`);
            }catch(error){console.error(error);setStatus("Impossible de charger ce projet JSON.");}
        }
        function loadImageFromURL(url){return new Promise((resolve,reject)=>{const image=new Image();image.onload=()=>resolve(image);image.onerror=reject;image.src=url;});}
        function downloadDataURL(url,filename,revoke=false){const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();if(revoke)setTimeout(()=>URL.revokeObjectURL(url),0);}

        ["dragenter","dragover"].forEach(type=>workspace.addEventListener(type,e=>{e.preventDefault();workspace.classList.add("drop-active");}));
        ["dragleave","drop"].forEach(type=>workspace.addEventListener(type,e=>{e.preventDefault();workspace.classList.remove("drop-active");}));
        workspace.addEventListener("drop",e=>{const file=e.dataTransfer.files[0];if(!file)return;if(file.type==="image/png"||file.name.toLowerCase().endsWith(".png"))loadPNGAsLayer(file);else if(file.name.toLowerCase().endsWith(".json"))loadProjectFile(file);else setStatus("Déposez un PNG ou JSON compatible.");});

        function toggleSidebar(side){
            const left=side==="left",className=left?"left-collapsed":"right-collapsed";document.body.classList.toggle(className);
            const collapsed=document.body.classList.contains(className),button=document.getElementById(left?"toggleLeft":"toggleRight");
            button.textContent=left?(collapsed?"›":"‹"):(collapsed?"‹":"›");button.title=collapsed?"Déployer la barre latérale":"Rétracter la barre latérale";
        }
        document.getElementById("toggleLeft").onclick=()=>toggleSidebar("left");document.getElementById("toggleRight").onclick=()=>toggleSidebar("right");

        const DEFAULT_SHORTCUTS={
            undo:"Ctrl+Z",redo:"Ctrl+Y",copy:"Ctrl+C",cut:"Ctrl+X",paste:"Ctrl+V",selectAll:"Ctrl+A",invertSelection:"Ctrl+I",
            toolPencil:"B",toolEraser:"E",toolFill:"G",toolMove:"M",toolRect:"R",toolLasso:"L",toolWand:"W",
            validate:"Enter",cancel:"Escape",deleteSelection:"Delete"
        };
        const SHORTCUT_LABELS={undo:"Annuler",redo:"Rétablir",copy:"Copier",cut:"Couper",paste:"Coller",selectAll:"Tout sélectionner",invertSelection:"Inverser sélection",toolPencil:"Outil crayon",toolEraser:"Outil gomme",toolFill:"Outil remplir",toolMove:"Déplacer le calque",toolRect:"Sélection rectangle",toolLasso:"Sélection lasso",toolWand:"Baguette magique",validate:"Valider transformation",cancel:"Annuler / désélectionner",deleteSelection:"Effacer la sélection"};
        let shortcuts=loadShortcutSettings(),shortcutDrafts={...shortcuts};
        function loadShortcutSettings(){try{return{...DEFAULT_SHORTCUTS,...JSON.parse(localStorage.getItem("tilesetEditorShortcuts")||"{}")};}catch(_){return{...DEFAULT_SHORTCUTS};}}
        function normalizeShortcutText(text){return String(text||"").trim().replace(/Cmd|Meta/gi,"Ctrl").replace(/Control/gi,"Ctrl").replace(/Del$/i,"Delete");}
        function shortcutFromEvent(event){
            const modifierKeys=["Control","Shift","Alt","Meta"];if(modifierKeys.includes(event.key))return null;
            let key=event.key;if(key===" ")key="Space";if(key.length===1)key=key.toUpperCase();if(key==="Backspace")key="Backspace";
            const parts=[];if(event.ctrlKey||event.metaKey)parts.push("Ctrl");if(event.altKey)parts.push("Alt");if(event.shiftKey)parts.push("Shift");parts.push(key);return parts.join("+");
        }
        function eventMatchesShortcut(event,shortcut){const current=shortcutFromEvent(event);return current&&normalizeShortcutText(current).toLowerCase()===normalizeShortcutText(shortcut).toLowerCase();}
        function renderShortcutEditor(){
            const list=document.getElementById("shortcutList");list.innerHTML="";
            Object.keys(DEFAULT_SHORTCUTS).forEach(id=>{const row=document.createElement("label");row.className="shortcut-row";const name=document.createElement("span");name.textContent=SHORTCUT_LABELS[id];const input=document.createElement("input");input.type="text";input.readOnly=true;input.className="shortcut-input";input.value=shortcutDrafts[id]||"";input.dataset.action=id;input.addEventListener("keydown",event=>{event.preventDefault();event.stopPropagation();if(event.key==="Escape")return;const value=shortcutFromEvent(event);if(value){shortcutDrafts[id]=value;input.value=value;}});row.append(name,input);list.append(row);});
        }
        function openShortcutModal(){shortcutDrafts={...shortcuts};renderShortcutEditor();document.getElementById("shortcutModal").hidden=false;}
        function closeShortcutModal(){document.getElementById("shortcutModal").hidden=true;}
        function resetShortcutDrafts(){shortcutDrafts={...DEFAULT_SHORTCUTS};renderShortcutEditor();}
        function saveShortcutSettings(){
            const values=Object.values(shortcutDrafts).filter(Boolean).map(v=>normalizeShortcutText(v).toLowerCase());
            if(new Set(values).size!==values.length)return alert("Deux actions utilisent le même raccourci. Modifiez l’un des doublons.");
            shortcuts={...shortcutDrafts};try{localStorage.setItem("tilesetEditorShortcuts",JSON.stringify(shortcuts));}catch(_){}closeShortcutModal();updateShortcutTitles();setStatus("Raccourcis enregistrés localement.");
        }
        function updateShortcutTitles(){
            const map={toolPencil:"btn-pencil",toolEraser:"btn-eraser",toolFill:"btn-fill",toolMove:"btn-move",toolRect:"btn-rect-select",toolLasso:"btn-lasso-select",toolWand:"btn-wand",undo:"btnUndo",redo:"btnRedo"};
            for(const[action,id]of Object.entries(map)){const element=document.getElementById(id);if(element)element.title=shortcuts[action]||"";}
        }
        function runShortcut(action,event){
            const actions={undo:executeUndo,redo:executeRedo,copy:copySelection,cut:cutSelection,paste:()=>pasteSelection(false),selectAll,invertSelection,toolPencil:()=>setTool("pencil"),toolEraser:()=>setTool("eraser"),toolFill:()=>setTool("fill"),toolMove:()=>setTool("move"),toolRect:()=>setTool("rect-select"),toolLasso:()=>setTool("lasso-select"),toolWand:()=>setTool("wand"),validate:()=>floatingSelection&&bakeFloatingSelection(),cancel:()=>floatingSelection?cancelFloatingSelection():clearSelection(),deleteSelection:()=>{if(hasSelection||floatingSelection)deleteSelectedPixels();}};
            if(actions[action]){event.preventDefault();actions[action]();return true;}return false;
        }
        document.addEventListener("keydown",event=>{
            if(!document.getElementById("shortcutModal").hidden){if(event.key==="Escape"){event.preventDefault();closeShortcutModal();}return;}
            const tag=event.target.tagName,editing=["INPUT","TEXTAREA","SELECT"].includes(tag);if(editing)return;
            for(const[action,shortcut]of Object.entries(shortcuts))if(eventMatchesShortcut(event,shortcut)){runShortcut(action,event);return;}
            if((event.ctrlKey||event.metaKey)&&event.shiftKey&&event.key.toLowerCase()==="z"){event.preventDefault();executeRedo();}
        });
        window.addEventListener("beforeunload",event=>{if(!projectDirty)return;event.preventDefault();event.returnValue=UNSAVED_MESSAGE;return UNSAVED_MESSAGE;});

        layers.push(new Layer("Calque 1"));activeLayerIndex=0;syncDimensionInputs();resizeDisplay();updateLayerUI();updateSelectionMemoryUI();updateShortcutTitles();history.reset(false);projectDirty=false;setTool("pencil");setStatus("Prêt. Sélections mémorisables, rotation précise et raccourcis personnalisables activés.");
    </script>
</body>
